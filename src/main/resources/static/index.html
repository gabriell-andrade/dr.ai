<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DR.ai</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>DR.ai</h1>
    <p>Resolva sua DR com inteligência</p>

    <div class="input-group">
        <label>Sua versão</label>
        <textarea id="pessoaA" placeholder="Descreva o que aconteceu..."></textarea>
    </div>

    <div class="input-group">
        <label>Versão da outra pessoa</label>
        <textarea id="pessoaB" placeholder="Descreva a versão da outra pessoa..."></textarea>
    </div>

    <button onclick="analisar()">Analisar DR</button>

    <div id="resultado" class="hidden"></div>
</div>

<script src="script.js"></script>
</body>
</html>
